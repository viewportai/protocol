name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  protocol:
    name: Protocol
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run generate:json-schemas
      - run: git diff --exit-code -- generated/json-schema
      - run: npm run validate:samples
      - run: npm run build
      - run: npm run pack:smoke
