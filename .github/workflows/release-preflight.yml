name: Release Preflight

on:
  pull_request:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - '.releaserc.json'
      - '.github/workflows/release-packages.yml'
      - '.github/workflows/release-preflight.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  protocol-npm-auth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Validate protocol publish metadata
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const expectedRepoUrl = `git+https://github.com/${process.env.GITHUB_REPOSITORY}.git`;
          if (pkg.name !== '@viewportai/protocol') {
            console.error(`package name must be @viewportai/protocol, got: ${pkg.name}`);
            process.exit(1);
          }
          if (pkg.private) {
            console.error('package.json must not be private for npm publishing.');
            process.exit(1);
          }
          if (pkg.repository?.url !== expectedRepoUrl) {
            console.error(`repository.url must equal ${expectedRepoUrl}, got: ${pkg.repository?.url}`);
            process.exit(1);
          }
          if (pkg.publishConfig?.access !== 'public') {
            console.error('package.json publishConfig.access must be public.');
            process.exit(1);
          }
          NODE

      - name: Verify release secret is configured
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "NPM_TOKEN is not configured for this repository."
            exit 1
          fi

      - name: Verify npm authentication
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm whoami --registry https://registry.npmjs.org/

      - name: Verify commit-analyzer preset dependency
        run: node -p "require.resolve('conventional-changelog-conventionalcommits')"
